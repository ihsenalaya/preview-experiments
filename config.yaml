# Single source of truth for all experiment parameters.
# All scripts read this file; override individual values with env vars prefixed EXP_.

cluster:
  type: kind           # kind | aks
  name: preview-exp
  kubeconfig: ""       # empty = use current kubeconfig context

operator:
  namespace: preview-operator-system
  helm_release: preview-operator
  helm_chart: ../preview-operator/charts/preview-operator
  image: preview-operator:dev

app:
  repo: ihsenalaya/idp-preview    # GitHub owner/repo (for diff fetching)
  image: ghcr.io/ihsenalaya/idp-preview:exp-20260514-e2efix-2089
  cr_namespace: default            # namespace where Preview CRs are created
  pr_number_base: 9000             # experiment PRs use numbers 9000-9999 to avoid conflicts

# Multi-subject configuration (see subjects/CONTRACT.md)
subjects:
  probe_image: ghcr.io/ihsenalaya/harness-probe:latest
  enabled:
    - s1-flask-catalog
    - s2-listmonk
    - s3-healthchecks
    - s4-umami
    - s5-petclinic
  images:
    s1-flask-catalog: ghcr.io/ihsenalaya/idp-preview:exp-20260514-e2efix-2089
    s2-listmonk: ghcr.io/ihsenalaya/s2-listmonk-adapter:v2.5.1
    s3-healthchecks: ghcr.io/ihsenalaya/s3-healthchecks-adapter:v3.6
    s4-umami: ghcr.io/ihsenalaya/s4-umami-adapter:v2.15.1
    s5-petclinic: ghcr.io/ihsenalaya/s5-petclinic-adapter:v3.4.0

# Frozen versions — bump deliberately, never automatically
versions:
  preview_operator_chart: 0.1.0
  postgres_image: postgres:15.6-alpine
  playwright_image: mcr.microsoft.com/playwright/python:v1.44.0-jammy
  python_slim: python:3.12-slim
  microcks_chart: 1.9.0
  kind_node: kindest/node:v1.30.0
  llm_model: gpt-4o-mini-2024-07-18   # exact model snapshot
  mutmut_version: "2.4.4"

experiments:
  flakiness:
    n_runs: 30
    isolation_values: [true, false]
    timeout_minutes: 20

  cross_pr:
    k_values: [2, 4, 8]
    isolation_values: [true, false]
    timeout_minutes: 40

  performance:
    n_runs: 30
    timeout_minutes: 25

  bug_detection:
    mutation_operators: [AOR, ROR, COI, DDL]   # mutmut operators
    n_mutations_max: 50
    # Volume-control conditions (RQ4 hardening):
    #   static     — no AI enrichment (baseline)
    #   llm_fixed  — AI enrichment, temperature=0 (same volume, deterministic)
    #   llm_free   — AI enrichment, temperature=0.7 (same volume, diverse)
    isolation_values: [static, llm_fixed, llm_free]
    llm_fixed_temperature: 0.0
    llm_free_temperature: 0.7
    timeout_minutes: 60

  idempotence:
    kill_steps:
      - saving
      - smoke
      - restore-regression
      - regression
      - restore-e2e
      - e2e
    n_restarts_per_step: 3
    timeout_minutes: 30

results_dir: results
figures_dir: analysis/figures
